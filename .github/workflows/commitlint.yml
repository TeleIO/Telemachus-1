name: Commit Lint

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  commitlint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitlint
        run: pip install gitlint

      - name: Lint commits
        run: gitlint --commits "origin/${{ github.base_ref }}..HEAD"
