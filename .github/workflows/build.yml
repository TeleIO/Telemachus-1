name: Build

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get install -y mono-complete curl unzip
          curl -sL https://dist.nuget.org/win-x86-commandline/latest/nuget.exe -o /tmp/nuget.exe

      - name: Restore NuGet packages
        run: mono /tmp/nuget.exe restore Telemachus.sln

      - name: Build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MONO_BCL=$(find /usr/lib/mono -maxdepth 1 -name "4.7*" -type d | sort -rV | head -1)
          echo "Using Mono BCL: $MONO_BCL"
          dotnet msbuild Telemachus.sln \
            /p:Configuration=Release \
            "/p:Platform=Any CPU" \
            /p:FrameworkPathOverride="$MONO_BCL"

      - name: Zip GameData
        run: cd publish && zip -r GameData.zip GameData

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GameData
          path: publish/GameData.zip

      - name: Generate changelog
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          # Install git-cliff
          curl -sL https://github.com/orhun/git-cliff/releases/latest/download/git-cliff-x86_64-unknown-linux-gnu.tar.gz | tar xz
          PREV_TAG=$(git tag --sort=-v:refname | head -2 | tail -1)

          # Telemachus changelog for this release
          echo '## Telemachus' > RELEASE_NOTES.md
          echo '' >> RELEASE_NOTES.md
          if [ -n "$PREV_TAG" ] && [ "$PREV_TAG" != "${GITHUB_REF#refs/tags/}" ]; then
            ./git-cliff "$PREV_TAG"..HEAD --strip header >> RELEASE_NOTES.md
          else
            ./git-cliff --latest --strip header >> RELEASE_NOTES.md
          fi

          # Houston changelog (commits since last Telemachus release)
          echo '' >> RELEASE_NOTES.md
          echo '## Houston (bundled UI)' >> RELEASE_NOTES.md
          echo '' >> RELEASE_NOTES.md
          HOUSTON_VERSION=$(curl -sH "Authorization: token $GITHUB_TOKEN" \
            https://api.github.com/repos/TeleIO/houston/releases/latest \
            | jq -r '.tag_name // empty')
          if [ -n "$HOUSTON_VERSION" ]; then
            HOUSTON_BODY=$(curl -sH "Authorization: token $GITHUB_TOKEN" \
              https://api.github.com/repos/TeleIO/houston/releases/latest \
              | jq -r '.body // empty')
            if [ -n "$HOUSTON_BODY" ]; then
              echo "$HOUSTON_BODY" >> RELEASE_NOTES.md
            else
              echo "Bundled Houston $HOUSTON_VERSION" >> RELEASE_NOTES.md
            fi
          else
            echo "Bundled latest Houston release." >> RELEASE_NOTES.md
          fi

          cat RELEASE_NOTES.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          files: publish/GameData.zip
